receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  awss3:
    s3uploader:
      region: "us-east-1"
      s3_bucket: "llm-telemetry"
      s3_prefix: "otel"
      s3_partition: "minute"
      s3_partition_format: "%Y/%m/%d/%H/%M"
      endpoint: "http://localstack:4566"
      s3_force_path_style: true
      disable_ssl: true
      compression: "gzip"
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
  prometheus:
    endpoint: "0.0.0.0:8889"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [awss3, otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [awss3, prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [awss3, otlphttp/loki]
