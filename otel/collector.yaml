receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  awss3:
    s3uploader:
      region: "us-east-1"
      s3_bucket: "llm-telemetry"
      s3_prefix: "otel"
      endpoint: "http://localstack:4566"
      s3_force_path_style: true
      disable_ssl: true
      compression: "gzip"
    sending_queue:
      enabled: true
      queue_size: 1024
  otlp_grpc/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true
  otlp_http/loki:
    endpoint: "http://loki:3100/otlp"

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [awss3, otlp_grpc/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [awss3]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [awss3, otlp_http/loki]
